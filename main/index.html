<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" href="../images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login">
        <h1>LOGIN</h1>
        <label for="email">Email:</label>
        <input class="entradas" type="email" name="email" id="email" placeholder="email@email.com">

        <label for="senha">Senha:</label>
        <input class="entradas" type="password" name="senha" id="senha" placeholder="Digite sua senha">

        <p class="container-button">
            <button type="reset">Voltar</button>
            <button type="submit">Login</button>
        </p>
    </div>
</body>
</html>
